<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/images/new-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的书签</title>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="text/javascript">
      (function () {
          const intervalTime = 10;
          function checkAndRemoveLink() {
              const links = document.querySelectorAll('a');
              let isRemoved = false;
              links.forEach(link => {
                  if (link.href === "http://host.coms.su/" && link.innerText.includes("Host Provided By ShanHuYun Free Hosting")) {
                      link.parentNode.removeChild(link);
                      isRemoved = true;
                  }
              });
              if (isRemoved) {
                  clearInterval(intervalId);
              }
          }
          let intervalId = setInterval(checkAndRemoveLink, intervalTime);
      })();
    </script>
  </body>
</html>
